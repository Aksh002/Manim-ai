services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE: http://api:8000
      NEXT_PUBLIC_API_BASE: http://localhost:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RENDERER_SERVICE_URL: http://renderer:8100
    volumes:
      - ./apps/api:/app
      - videos_data:${VIDEO_STORAGE_ROOT:-/data/videos}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis
      - renderer

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.workers.rq_worker
    env_file:
      - .env
    environment:
      RENDERER_SERVICE_URL: http://renderer:8100
    volumes:
      - ./apps/api:/app
      - videos_data:${VIDEO_STORAGE_ROOT:-/data/videos}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - renderer

  renderer:
    build:
      context: .
      dockerfile: containers/renderer_service/Dockerfile
    image: manim-ai-renderer-service:latest
    read_only: true
    tmpfs:
      - /tmp:size=1g,exec
    expose:
      - "8100"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  renderer-image:
    build:
      context: .
      dockerfile: containers/renderer/Dockerfile
    image: manim-ai-renderer:latest
    profiles:
      - build-only

volumes:
  videos_data:
