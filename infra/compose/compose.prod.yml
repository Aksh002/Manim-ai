# Production compose extension
# “Phase 2/secure” path, docker-compose.yml (line 1) starts web, api, worker, redis, and an optional renderer-image, and the worker renders inside a separate sandbox container.
# Usage: docker compose -f docker-compose.yml -f infra/compose/compose.prod.yml up -d

services:
  web:
    restart: unless-stopped
  api:
    restart: unless-stopped
  worker:
    restart: unless-stopped
    deploy:
      replicas: 2
  redis:
    restart: unless-stopped
  ollama:
    restart: unless-stopped
