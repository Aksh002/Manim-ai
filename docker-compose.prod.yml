services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RENDER_MODE: service
      RENDERER_SERVICE_URL: http://renderer:8100
      ALLOW_OWNER_TOKEN_FALLBACK: "false"
    depends_on:
      redis:
        condition: service_started
      renderer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.workers.rq_worker
    env_file:
      - .env
    environment:
      RENDER_MODE: service
      RENDERER_SERVICE_URL: http://renderer:8100
      ALLOW_OWNER_TOKEN_FALLBACK: "false"
    depends_on:
      redis:
        condition: service_started
      renderer:
        condition: service_healthy

  cleanup:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: python -m app.workers.cleanup --loop
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started

  renderer:
    build:
      context: .
      dockerfile: containers/renderer_service/Dockerfile
    image: manim-ai-renderer-service:latest
    read_only: true
    tmpfs:
      - /tmp:size=1g,exec
    expose:
      - "8100"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
